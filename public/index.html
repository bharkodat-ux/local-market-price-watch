<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Local Market Price Watch</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="wrap">
    <h1>Local Market Price Watch</h1>

    <div class="controls">
      <input id="item" placeholder="Item (e.g. Tomatoes)" />
      <input id="vendor" placeholder="Vendor (optional)" />
      <button id="search">Search</button>
      <button id="reset">Reset</button>
    </div>

    <div id="results">Loading prices…</div>

    <hr />
    <h2>Submit price</h2>
    <form id="submitForm">
      <input name="item" placeholder="Item" required />
      <input name="vendor" placeholder="Vendor" required />
      <input name="price" type="number" step="0.01" placeholder="Price" required />
      <input name="unit" placeholder="Unit (e.g. kg, L)" />
      <button type="submit">Submit</button>
    </form>
  </div>
  <script src="/app.js"></script>
</body>
</html>
